name: vidropdownloader_app
description: "ViDrop - Video & MP3 Downloader"
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  url_launcher: ^6.2.5
  youtube_explode_dart: ^3.0.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  dio: ^5.9.2
  device_info_plus: ^11.3.0
  open_file: ^3.5.9
  video_compress: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: false
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
